<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meine Webseite</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f2f2f2;
      text-align: center;
      padding: 50px;
    }

    h1 {
      color: #333;
      font-size: 40px;
    }

    p {
      font-size: 20px;
      color: #666;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 15px;
      max-width: 600px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body>

  <div class="box">
    <h1>Willkommen auf meiner Webseite 🎉</h1>
    <p>Meine erste kostenlose Webseite ist online.</p>
  </div>

</body>
</html>
