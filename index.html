<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fetrat</title>

  <style>

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #cfefff;
      color: #111827;
      text-align: center;
    }

    .container {
      max-width: 500px;
      margin: 80px auto;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
      margin-bottom: 25px;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
      color: #111827;
    }

    p {
      font-size: 18px;
      color: #374151;
    }

    button, a {
      display: block;
      width: 100%;
      margin: 14px 0;
      padding: 16px;
      border-radius: 14px;
      border: none;
      background: #5b4636;
      color: white;
      font-size: 18px;
      font-weight: bold;
      text-decoration: none;
      cursor: pointer;
      box-sizing: border-box;
      transition: 0.3s;
    }

    button:hover, a:hover {
      background: #6d5644;
    }

    .hidden {
      display: none;
    }

    .small {
      font-size: 14px;
      color: #6b7280;
      margin-top: 10px;
    }

  </style>
</head>

<body>

  <div class="container">

    <div class="card">

      <h1>Willkommen 👋</h1>

      <p>Danke, dass du da bist.</p>

      <button onclick="showSection('social')">
        Soziale Medien
      </button>

      <button onclick="showSection('kontakt')">
        Kontakte
      </button>

      <button onclick="showSection('spenden')">
        Spenden
      </button>

    </div>

    <div id="kontakt" class="card hidden">

      <h2>Kontakte</h2>

      <p><strong>E-Mail:</strong> Fetrathazratn@gmail.com</p>

      <p><strong>Telefon:</strong> +49 173 7219411</p>

    </div>

    <div id="social" class="card hidden">

      <h2>Soziale Medien</h2>

      <a href="https://instagram.com/fetrat_h_r" target="_blank">
        Instagram
      </a>

      <a href="https://tiktok.com/@fetratdaily" target="_blank">
        TikTok
      </a>

      <a href="https://youtube.com/@FetratSportsIQ" target="_blank">
        YouTube
      </a>

      <p class="small">
        Folge mir für mehr Content 😄
      </p>

    </div>

    <div id="spenden" class="card hidden">

      <h2>Spenden</h2>

      <a href="https://paypal.me/yourcentwillhelp" target="_blank">
        Mit PayPal spenden
      </a>

      <p class="small">
        Danke für deine Unterstützung ❤️
      </p>

    </div>

  </div>

  <script>

    function showSection(id) {

      document.getElementById("kontakt").classList.add("hidden");
      document.getElementById("social").classList.add("hidden");
      document.getElementById("spenden").classList.add("hidden");

      document.getElementById(id).classList.remove("hidden");
    }

  </script>

</body>
</html>
